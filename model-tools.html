<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Model × Tool Matrix</title>
    <link rel="icon" href="src/assets/icon.svg" />
    <link rel="stylesheet" href="src/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="topbar-brand">
          <h1>Model × Tool Matrix</h1>
        </div>
        <nav class="nav-tabs">
          <a href="index.html" class="nav-link">并行计算</a>
          <a href="models.html" class="nav-link">大模型</a>
          <a href="agent-tools.html" class="nav-link">Agent 工具</a>
          <a href="model-tools.html" class="nav-link active">模型 × 工具</a>
        </nav>
      </header>

      <main class="workspace">
        <div class="filter-card">
          <section class="control-band">
            <div class="search-block">
              <label for="globalSearch">搜索矩阵</label>
              <input id="globalSearch" type="search" placeholder="模型、工具、接入方式、价格口径、评价..." />
            </div>
            <div class="control">
              <label for="toolFilter">聚焦工具</label>
              <select id="toolFilter"></select>
            </div>
            <div class="control">
              <label for="modelVendorFilter">模型厂商</label>
              <select id="modelVendorFilter"></select>
            </div>
            <div class="control">
              <label for="statusFilter">接入状态</label>
              <select id="statusFilter"></select>
            </div>
            <div class="control">
              <label for="routeFilter">接入方式</label>
              <select id="routeFilter"></select>
            </div>
            <div class="control">
              <label for="sortField">模型行排序</label>
              <select id="sortField"></select>
            </div>
            <button class="ghost-button" id="sortDirectionButton" type="button">降序</button>
            <button class="ghost-button" id="resetFiltersButton" type="button">重置</button>
          </section>

          <section class="filters-panel-inner">
            <div class="panel-head">
              <h2>组合筛选</h2>
              <button class="text-button" id="addRuleButton" type="button">添加条件</button>
            </div>
            <div id="filterRules" class="rules"></div>
          </section>
        </div>

        <section class="insight-grid" aria-label="统计概览">
          <div class="metric">
            <span>筛选组合</span>
            <strong id="visibleCount">0</strong>
          </div>
          <div class="metric">
            <span>官方/默认</span>
            <strong id="nativeCount">-</strong>
          </div>
          <div class="metric">
            <span>BYOK/兼容</span>
            <strong id="byokCount">-</strong>
          </div>
          <div class="metric">
            <span>平均 Agent 适配</span>
            <strong id="avgAgentFit">-</strong>
          </div>
        </section>

        <section class="table-panel">
          <div class="panel-head">
            <h2>模型 × 工具矩阵</h2>
            <div class="table-tools">
              <button
                class="text-button"
                id="toggleColumnsButton"
                type="button"
                aria-expanded="false"
                aria-controls="columnPicker"
              >
                列设置
              </button>
              <button class="text-button" id="compactToggleButton" type="button">紧凑模式</button>
              <button class="text-button" id="exportCsvButton" type="button">下载 CSV</button>
            </div>
          </div>
          <div class="column-picker" id="columnPicker" hidden></div>
          <div class="table-wrap">
            <table id="gpuTable">
              <thead id="tableHead"></thead>
              <tbody id="tableBody"></tbody>
            </table>
          </div>
        </section>
      </main>
    </div>

    <script type="module" src="src/model-tools.js"></script>
  </body>
</html>
