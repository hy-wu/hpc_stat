<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LLM Comparison</title>
    <link rel="icon" href="src/assets/icon.png" />
    <link rel="stylesheet" href="src/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="topbar-brand">
          <h1>LLM Comparison</h1>
        </div>
        <nav class="nav-tabs">
          <a href="index.html" class="nav-link">并行计算</a>
          <a href="models.html" class="nav-link active">大模型</a>
        </nav>
      </header>

      <main class="workspace">
        <div class="filter-card">
          <section class="control-band">
            <div class="search-block">
              <label for="globalSearch">搜索模型</label>
              <input id="globalSearch" type="search" placeholder="名称、厂商、性能标签、价格、评测..." />
            </div>
            <div class="control">
              <label for="modalityFilter">模态</label>
              <select id="modalityFilter"></select>
            </div>
            <div class="control">
              <label for="statusFilter">核验状态</label>
              <select id="statusFilter"></select>
            </div>
            <div class="control">
              <label for="vendorFilter">厂商</label>
              <select id="vendorFilter"></select>
            </div>
            <div class="control">
              <label for="sortField">排序字段</label>
              <select id="sortField"></select>
            </div>
            <button class="ghost-button" id="sortDirectionButton" type="button">升序</button>
            <button class="ghost-button" id="resetFiltersButton" type="button">重置</button>
          </section>

          <section class="filters-panel-inner">
            <div class="panel-head">
              <h2>字段筛选</h2>
              <button class="text-button" id="addRuleButton" type="button">添加条件</button>
            </div>
            <div id="filterRules" class="rules"></div>
          </section>
        </div>

        <section class="insight-grid" aria-label="统计概览">
          <div class="metric">
            <span>对比模型</span>
            <strong id="visibleCount">0</strong>
          </div>
          <div class="metric">
            <span>模型名已验证</span>
            <strong id="bestElo">-</strong>
          </div>
          <div class="metric">
            <span>官方价格覆盖</span>
            <strong id="bestHumanEval">-</strong>
          </div>
        </section>

        <section class="table-panel">
          <div class="panel-head">
            <h2>已核验模型表</h2>
            
            <div class="table-tools">
              <button
                class="text-button"
                id="toggleColumnsButton"
                type="button"
                aria-expanded="false"
                aria-controls="columnPicker"
              >
                列设置
              </button>
              <button class="text-button" id="compactToggleButton" type="button">紧凑模式</button>
              <button class="text-button" id="exportCsvButton" type="button">下载 CSV</button>
            </div>
          </div>
          <div class="column-picker" id="columnPicker" hidden></div>
          <div class="table-wrap">
            <table id="gpuTable"> <!-- Reusing ID for CSS -->
              <thead id="tableHead"></thead>
              <tbody id="tableBody"></tbody>
            </table>
          </div>
        </section>
      </main>
    </div>

    <script type="module" src="src/models.js"></script>
  </body>
</html>
